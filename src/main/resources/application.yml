server:
  port: 8080

spring:
  application:
    name: bulkflow
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:5432/bulkFlow
    username: postgres
    password: 123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

file:
  upload-dir: uploads

scheduler:
  chunk-retry:
    cron: "0 */10 * * * *"
